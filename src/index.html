<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

/* ---------- icons ---------- */

const IcCamera=({className})=><Svg className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></Svg>;
const IcCompare=({className})=><Svg className={className}><polyline points="17 1 21 5 17 9"/><path d="M3 5h18"/><polyline points="7 23 3 19 7 15"/><path d="M21 19H3"/></Svg>;
const IcSave=({className})=><Svg className={className}><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></Svg>;
const IcChart=({className})=><Svg className={className}><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="10"/></Svg>;
const IcUsers=({className})=><Svg className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Svg>;
const IcHistory=({className})=><Svg className={className}><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></Svg>;
const IcSettings=({className})=><Svg className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></Svg>;
const IcSun=({className})=><Svg className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></Svg>;
const IcMoon=({className})=><Svg className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></Svg>;
const IcTrophy=({className})=><Svg className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></Svg>;
const IcTrash=({className})=><Svg className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Svg>;
const IcLoad=({className})=><Svg className={className}><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></Svg>;
const IcReset=({className})=><Svg className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></Svg>;

/* ---------- data ---------- */
const attr={pace:"Pace",acceleration:"Acceleration",stamina:"Stamina",jumpingReach:"Jumping Reach",balance:"Balance",strength:"Strength",agility:"Agility",naturalFitness:"Natural Fitness",anticipation:"Anticipation",workRate:"Work Rate",concentration:"Concentration",determination:"Determination",decisions:"Decisions",composure:"Composure",dribbling:"Dribbling",finishing:"Finishing",longShots:"Long Shots",heading:"Heading",crossing:"Crossing",firstTouch:"First Touch",passing:"Passing",technique:"Technique",tackling:"Tackling",consistency:"Consistency",gkReflexes:"Reflexes",gkAgility:"Agility",gkAcceleration:"Acceleration",gkOneOnOnes:"One On Ones",gkAerialReach:"Aerial Reach",gkCommandOfArea:"Command Of Area",gkCommunication:"Communication",gkHandling:"Handling",gkAnticipation:"Anticipation",gkConcentration:"Concentration",gkPositioning:"Positioning"};

const imp={pace:{p:64,gf:45,ga:-59},acceleration:{p:64,gf:49,ga:-48},stamina:{p:19,gf:9,ga:-16},jumpingReach:{p:16,gf:14,ga:-8},balance:{p:13,gf:10,ga:-8},strength:{p:10,gf:7,ga:-5},agility:{p:8,gf:6,ga:-6},naturalFitness:{p:2,gf:2,ga:-2},anticipation:{p:18,gf:15,ga:-10},workRate:{p:12,gf:6,ga:-10},concentration:{p:9,gf:4,ga:-8},determination:{p:6,gf:4,ga:-5},decisions:{p:1,gf:2,ga:0},composure:{p:1,gf:2,ga:0},dribbling:{p:19,gf:25,ga:-3},finishing:{p:8,gf:8,ga:-1},longShots:{p:6,gf:7,ga:0},heading:{p:5,gf:5,ga:-1},crossing:{p:4,gf:5,ga:0},firstTouch:{p:3,gf:2,ga:-2},passing:{p:2,gf:4,ga:0},technique:{p:1,gf:2,ga:0},tackling:{p:1,gf:0,ga:-2},consistency:{p:10,gf:8,ga:-8},gkReflexes:{p:8,gf:0,ga:-10},gkAgility:{p:6,gf:0,ga:-8},gkAcceleration:{p:2,gf:0,ga:-3},gkOneOnOnes:{p:0.3,gf:0,ga:-1},gkAerialReach:{p:0.1,gf:0,ga:-0.25},gkCommandOfArea:{p:0.1,gf:0,ga:-0.25},gkCommunication:{p:0.1,gf:0,ga:-0.25},gkHandling:{p:0.1,gf:0,ga:-0.25},gkAnticipation:{p:0.1,gf:0,ga:-0.25},gkConcentration:{p:0.1,gf:0,ga:-0.25},gkPositioning:{p:0.1,gf:0,ga:-0.25}};

const MAP_OUT={"pace":"pace","acceleration":"acceleration","stamina":"stamina","jumping reach":"jumpingReach","balance":"balance","strength":"strength","agility":"agility","natural fitness":"naturalFitness","anticipation":"anticipation","work rate":"workRate","concentration":"concentration","determination":"determination","decisions":"decisions","composure":"composure","dribbling":"dribbling","finishing":"finishing","long shots":"longShots","heading":"heading","crossing":"crossing","first touch":"firstTouch","passing":"passing","technique":"technique","tackling":"tackling"};
const MAP_GK={"reflexes":"gkReflexes","agility":"gkAgility","acceleration":"gkAcceleration","one on ones":"gkOneOnOnes","aerial reach":"gkAerialReach","command of area":"gkCommandOfArea","communication":"gkCommunication","handling":"gkHandling","anticipation":"gkAnticipation","concentration":"gkConcentration","positioning":"gkPositioning"};
const GK_DET={"reflexes":"a","one on ones":"b","aerial reach":"c","command of area":"d","handling":"e","kicking":"f","throwing":"g","punching":"h"};

const GEMINI_MODEL='gemini-2.5-flash';
const GEMINI_PROMPT='You are reading a Football Manager player profile screenshot. Return ONLY a JSON object with these fields: "name" (the player name shown at the top of the profile, or empty string if not visible), "position" (short position code like "DC" or "ST", or empty string), "goalkeeper" (boolean, true only if the image shows goalkeeping attributes such as Reflexes, Handling, Aerial Reach, Command Of Area, One On Ones), and "attributes" (an object mapping attribute name to its integer value from 1 to 20). Read the number shown next to each attribute exactly. Only include attributes that are visibly present with a number; never guess or invent a value. Use these exact attribute names as keys when present: Crossing, Dribbling, Finishing, First Touch, Heading, Long Shots, Marking, Passing, Tackling, Technique, Corners, Free Kick Taking, Long Throws, Penalty Taking, Aggression, Anticipation, Bravery, Composure, Concentration, Decisions, Determination, Flair, Leadership, Off The Ball, Positioning, Teamwork, Vision, Work Rate, Acceleration, Agility, Balance, Jumping Reach, Natural Fitness, Pace, Stamina, Strength, Aerial Reach, Command Of Area, Communication, Handling, Kicking, One On Ones, Punching, Reflexes, Rushing Out, Throwing.';

/* ---------- attribute groups ---------- */
const OFF=['pace','acceleration','stamina','jumpingReach','balance','strength','agility','naturalFitness','anticipation','workRate','concentration','determination','decisions','composure','dribbling','finishing','longShots','heading','crossing','firstTouch','passing','technique','consistency'];
const DEFN=['pace','acceleration','stamina','jumpingReach','balance','strength','agility','naturalFitness','anticipation','workRate','concentration','determination','dribbling','finishing','heading','firstTouch','tackling','consistency'];
const GKL=['gkReflexes','gkAgility','gkAcceleration','gkOneOnOnes','gkAerialReach','gkCommandOfArea','gkCommunication','gkHandling','gkAnticipation','gkConcentration','gkPositioning'];
const PH=['pace','acceleration','stamina','jumpingReach','balance','strength','agility','naturalFitness'];
const ME=['anticipation','workRate','concentration','determination','decisions','composure'];
const TE=['dribbling','finishing','longShots','heading','crossing','firstTouch','passing','technique','tackling'];
const HI=['consistency'];
const DEF=Object.keys(attr).reduce((a,k)=>{a[k]=8;return a},{});

/* ---------- colors ---------- */
const POS='text-emerald-500',NEG='text-rose-500',NEU='text-gray-400',ACC='text-amber-500';
const TIER_TEXT={S:'text-rose-500',A:'text-orange-500',B:'text-amber-500',C:'text-emerald-500',D:'text-sky-500'};
const CAT={
  Physical:{acc:'text-emerald-500'},
  Mental:{acc:'text-sky-500'},
  Technical:{acc:'text-amber-500'},
  Hidden:{acc:'text-violet-500'},
  Goalkeeper:{acc:'text-rose-500'}
};

/* ---------- pure helpers ---------- */
const load=(k,f)=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):f;}catch(e){return f;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const fmt=(n)=>(n>0?'+':'')+Number(n).toFixed(1);
const colFor=(v,kind)=>kind==='pt'?ACC:kind==='ga'?(v<0?POS:v>0?NEG:NEU):(v>0?POS:v<0?NEG:NEU);
const dcolFor=(v,kind)=>kind==='ga'?(v<0?POS:v>0?NEG:NEU):(v>0?POS:v<0?NEG:NEU);
const sortKeys=(ar)=>[...ar].sort((a,b)=>attr[a].localeCompare(attr[b],'en'));

const tierOf=(k)=>{
  const i=imp[k]||{};
  if(k.startsWith('gk')){const ga=Math.abs(i.ga||0);if(ga>=10)return'S';if(ga>=8)return'A';if(ga>=3)return'B';if(ga>=1)return'C';return'D';}
  const p=i.p||0;if(p>=60)return'S';if(p>=15)return'A';if(p>=8)return'B';if(p>=4)return'C';return'D';
};
const calcImpact=(x,vis)=>{let pt=0,gf=0,ga=0;vis.forEach(k=>{const i=imp[k];if(i){const mul=(x[k]-8)/12;pt+=i.p*mul;gf+=i.gf*mul;ga+=i.ga*mul;}});return{pt,gf,ga};};
const contribsOf=(x,vis)=>vis.filter(k=>imp[k]).map(k=>{const mul=(x[k]-8)/12;const i=imp[k];return{k,p:i.p*mul,gf:i.gf*mul,ga:i.ga*mul};}).filter(r=>Math.abs(r.p)>0.05).sort((a,b)=>Math.abs(b.p)-Math.abs(a.p));
const deltaContribs=(a,b,vis)=>vis.filter(k=>imp[k]).map(k=>{const i=imp[k];const m=((a[k]-8)-(b[k]-8))/12;return{k,p:i.p*m,gf:i.gf*m,ga:i.ga*m};}).filter(r=>Math.abs(r.p)>0.05).sort((x,y)=>Math.abs(y.p)-Math.abs(x.p));

/* ---------- OCR helpers ---------- */
const lev=(a,b)=>{const m=a.length,n=b.length;if(!m)return n;if(!n)return m;let prev=Array.from({length:n+1},(_,j)=>j),cur=new Array(n+1);for(let i=1;i<=m;i++){cur[0]=i;for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+c);}const t=prev;prev=cur;cur=t;}return prev[n];};
const matchName=(cand,names)=>{if(!cand)return null;let best=null,bd=99;names.forEach(nm=>{const t=nm.length<=5?1:2;const d=lev(cand,nm);if(d<=t&&d<bd){bd=d;best=nm;}});return best;};
const pairFuzzy=(low,map)=>{
  const names=Object.keys(map);const toks=low.split(/\s+/).filter(Boolean);const res={};let buf=[];
  for(const tk of toks){
    if(/^[0-9]{1,2}$/.test(tk)){const v=parseInt(tk,10);if(v>=1&&v<=20&&buf.length){const nm=matchName(buf.slice(-3).join(' '),names)||matchName(buf.slice(-2).join(' '),names)||matchName(buf[buf.length-1],names);if(nm)res[map[nm]]=v;}buf=[];}
    else{const w=tk.replace(/[^a-z]/g,'');if(w){buf.push(w);if(buf.length>3)buf.shift();}}
  }
  return res;
};
const parseOcr=(text)=>{const low=text.toLowerCase();const isGk=Object.keys(pairFuzzy(low,GK_DET)).length>=2;const map=isGk?MAP_GK:MAP_OUT;return{res:pairFuzzy(low,map),isGk};};
const upscale=(dataUrl)=>new Promise((resolve)=>{const img=new Image();img.onload=()=>{try{const w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;if(!w||w>=2400){resolve(dataUrl);return;}const scale=w<1200?3:2;const cv=document.createElement('canvas');cv.width=w*scale;cv.height=h*scale;const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.drawImage(img,0,0,cv.width,cv.height);resolve(cv.toDataURL('image/png'));}catch(e){resolve(dataUrl);}};img.onerror=()=>resolve(dataUrl);img.src=dataUrl;});

const geminiExtract=async(dataUrl,key)=>{
  const mm=dataUrl.match(/^data:(.*?);base64,(.*)$/);if(!mm)throw new Error('Unsupported image data.');
  const body={contents:[{parts:[{text:GEMINI_PROMPT},{inline_data:{mime_type:mm[1],data:mm[2]}}]}],generationConfig:{temperature:0,responseMimeType:'application/json'}};
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent?key='+encodeURIComponent(key);
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text();throw new Error('HTTP '+r.status+' - '+t.slice(0,180));}
  const j=await r.json();
  const txt=j&&j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts&&j.candidates[0].content.parts[0]&&j.candidates[0].content.parts[0].text;
  if(!txt)throw new Error('Empty response from Gemini.');
  let parsed;try{parsed=JSON.parse(txt);}catch(e){throw new Error('Could not parse Gemini JSON.');}
  const isGk=!!parsed.goalkeeper;const map=isGk?MAP_GK:MAP_OUT;const at=parsed.attributes||{};const res={};
  Object.keys(at).forEach(name=>{const key=map[String(name).toLowerCase().trim()];const v=parseInt(at[name],10);if(key&&v>=1&&v<=20)res[key]=v;});
  return{res,isGk,name:(parsed.name||'').toString().trim(),raw:txt};
};
const tesseractExtract=async(dataUrl,onProg)=>{const src=await upscale(dataUrl);const {data}=await Tesseract.recognize(src,'eng',{logger:mm=>{if(mm.status==='recognizing text')onProg(Math.round(mm.progress*100));}});const p=parseOcr(data.text);return{res:p.res,isGk:p.isGk,name:'',raw:data.text||''};};

/* ---------- presentational components (module scope: stable identity) ---------- */
const Num=({value,onChange,th})=>{
  const upd=(nv)=>onChange(Math.max(1,Math.min(20,nv)));
  return <div className="flex items-center gap-1">
    <button onClick={()=>upd(value-1)} className={`w-7 h-7 sm:w-8 sm:h-8 ${th.btn} rounded-md font-bold leading-none text-lg flex items-center justify-center pb-0.5`}>-</button>
    <input type="number" min="1" max="20" value={value} onChange={e=>upd(parseInt(e.target.value)||1)} className={`w-10 sm:w-12 h-7 sm:h-8 ${th.inp} border rounded-md text-center text-sm sm:text-base font-bold focus:outline-none focus:ring-2 focus:ring-amber-500`}/>
    <button onClick={()=>upd(value+1)} className={`w-7 h-7 sm:w-8 sm:h-8 ${th.btn} rounded-md font-bold leading-none text-lg flex items-center justify-center pb-0.5`}>+</button>
  </div>;
};

const AttrRowSingle=({k,val,setVal,th})=>{
  const t=tierOf(k);
  return <div className={`flex justify-between items-center py-2 border-b ${th.bc}`}>
    <label className={`text-sm font-medium ${th.txt2} flex items-center gap-2`}>{attr[k]}<span className={`text-[10px] font-bold px-1.5 py-0.5 rounded bg-gray-500/10 ${TIER_TEXT[t]}`}>{t}</span></label>
    <Num value={val} onChange={setVal} th={th}/>
  </div>;
};

const AttrRowCompare=({k,v1,v2,set1,set2,th})=>{
  const t=tierOf(k);const d=v1-v2;
  return <div className={`flex items-center justify-between gap-2 py-2 border-b ${th.bc}`}>
    <div className="flex-1 flex justify-start items-center gap-2 sm:gap-3">
      <Num value={v1} onChange={set1} th={th}/>
      <span className={`text-xs font-bold ${d>0?POS:'text-transparent select-none'}`}>+{d}</span>
    </div>
    
    <div className="flex flex-col items-center justify-center w-28 sm:w-32 shrink-0 text-center">
      <span className={`text-sm font-semibold ${th.txt2}`}>{attr[k]}</span>
      <span className={`text-[10px] font-bold ${TIER_TEXT[t]} mt-0.5`}>{t} Tier</span>
    </div>
    
    <div className="flex-1 flex justify-end items-center gap-2 sm:gap-3">
      <span className={`text-xs font-bold ${d<0?POS:'text-transparent select-none'}`}>+{-d}</span>
      <Num value={v2} onChange={set2} th={th}/>
    </div>
  </div>;
};

const Cat=({title,keys,compare,p1,p2,setP1,setP2,th,onlyDiff})=>{
  let ks=keys;
  if(compare&&onlyDiff)ks=keys.filter(k=>p1[k]!==p2[k]);
  if(ks.length===0)return null;
  const cat=CAT[title]||CAT.Physical;
  return <div className={`${th.card} rounded-xl border ${th.cb} p-4 sm:p-5 shadow-sm`}>
    <h3 className={`text-xs font-bold uppercase tracking-wider ${cat.acc} mb-3 pb-2.5 border-b ${th.bc}`}>{title}</h3>
    {ks.map(k=>compare
      ?<AttrRowCompare key={k} k={k} v1={p1[k]} v2={p2[k]} set1={v=>setP1(prev=>({...prev,[k]:v}))} set2={v=>setP2(prev=>({...prev,[k]:v}))} th={th}/>
      :<AttrRowSingle key={k} k={k} val={p1[k]} setVal={v=>setP1(prev=>({...prev,[k]:v}))} th={th}/>)}
  </div>;
};

const Bar=({v,max})=>{const pct=max>0?Math.min(100,Math.abs(v)/max*100):0;return <div className="flex-1 h-1.5 bg-gray-500/20 rounded relative overflow-hidden"><div className={`h-full rounded ${v>=0?'bg-emerald-500':'bg-rose-500'}`} style={{width:pct+'%'}}/></div>;};

const Breakdown=({rows,th,compare})=>{
  const max=rows.reduce((m,r)=>Math.max(m,Math.abs(r.p)),0);
  return <div className={`${th.ib} border ${th.cb} rounded-xl p-4 sm:p-5 mb-5 shadow-sm`}>
    <h3 className={`text-sm font-bold uppercase tracking-wider ${ACC} mb-4`}>Why this score{compare?' (P1 − P2 points)':' (points)'}</h3>
    {rows.length===0?<p className={`text-sm ${th.txtm}`}>All active attributes are at 8 (neutral), so nothing adds or subtracts yet.</p>:
    <div className="space-y-2 max-h-80 overflow-y-auto pr-2">
      {rows.map(r=><div key={r.k} className="flex items-center gap-3 text-sm">
        <span className={`w-32 shrink-0 truncate font-medium ${th.txt2}`}>{attr[r.k]}</span>
        <Bar v={r.p} max={max}/>
        <span className={`w-14 text-right font-bold ${r.p>0?POS:r.p<0?NEG:'text-gray-500'}`}>{fmt(r.p)}</span>
      </div>)}
    </div>}
  </div>;
};

const Seg=({value,onChange,options,th})=>
  <div className={`inline-flex gap-0.5 p-0.5 rounded-lg ${th.seg}`}>
    {options.map(o=><button key={o.v} onClick={()=>onChange(o.v)} className={`flex items-center gap-1.5 px-3 py-1 rounded-md text-sm font-medium border transition-colors ${value===o.v?th.acc:'bg-transparent border-transparent '+th.txt2}`}>{o.icon}{o.label}</button>)}
  </div>;

/* ---------- app ---------- */
function App(){
  const [m,setM]=useState('all');
  const [c,setC]=useState(false);
  const [dm,setDm]=useState(true);
  const [showSettings,setShowSettings]=useState(false);
  const [showHs,setShowHs]=useState(false);
  const [showRoster,setShowRoster]=useState(false);
  const [showBreak,setShowBreak]=useState(false);
  const [onlyDiff,setOnlyDiff]=useState(false);
  const [vw,setVw]=useState(()=>typeof window!=='undefined'?window.innerWidth:1280);

  const [hs,setHs]=useState([]);
  const [roster,setRoster]=useState(()=>load('fm_roster',[]));
  const [seenTip,setSeenTip]=useState(()=>{try{return localStorage.getItem('fm_seen_tip')==='1';}catch(e){return false;}});

  const [p1,setP1]=useState(DEF);
  const [p2,setP2]=useState(DEF);
  const [p1name,setP1name]=useState('');
  const [p2name,setP2name]=useState('');

  const [showOcr,setShowOcr]=useState(false);
  const [ocrTarget,setOcrTarget]=useState('p1');
  const [ocrImg,setOcrImg]=useState(null);
  const [ocrBusy,setOcrBusy]=useState(false);
  const [ocrProg,setOcrProg]=useState(0);
  const [ocrRes,setOcrRes]=useState(null);
  const [ocrGk,setOcrGk]=useState(false);
  const [ocrErr,setOcrErr]=useState('');
  const [ocrFound,setOcrFound]=useState([]);
  const [ocrRaw,setOcrRaw]=useState('');
  const [ocrName,setOcrName]=useState('');
  const [dragging,setDragging]=useState(false);
  const [ocrEngine,setOcrEngine]=useState(()=>{try{return localStorage.getItem('fm_ocr_engine')||'gemini';}catch(e){return 'gemini';}});
  const [gkey,setGkey]=useState(()=>{try{return localStorage.getItem('fm_gemini_key')||'';}catch(e){return '';}});

  const saveGkey=(v)=>{setGkey(v);try{localStorage.setItem('fm_gemini_key',v);}catch(e){}};
  const chooseEngine=(v)=>{setOcrEngine(v);try{localStorage.setItem('fm_ocr_engine',v);}catch(e){}};
  const dismissTip=()=>{setSeenTip(true);try{localStorage.setItem('fm_seen_tip','1');}catch(e){}};

  useEffect(()=>{setHs(load('fm_history',[]));},[]);
  useEffect(()=>{save('fm_history',hs);},[hs]);
  useEffect(()=>{save('fm_roster',roster);},[roster]);
  useEffect(()=>{const on=()=>setVw(window.innerWidth);window.addEventListener('resize',on);return()=>window.removeEventListener('resize',on);},[]);

  const vis=m==='offensive'?OFF:m==='defensive'?DEFN:m==='goalkeeper'?GKL:Object.keys(attr);
  const visSorted=(list)=>sortKeys(list.filter(k=>vis.includes(k)));

  const i1=calcImpact(p1,vis);
  const i2=calcImpact(p2,vis);
  const breakRows=c?deltaContribs(p1,p2,vis):contribsOf(p1,vis);

  const now=()=>({t:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),d:new Date().toLocaleDateString('en-GB')});
  const fx=(o)=>({pt:o.pt.toFixed(1),gf:o.gf.toFixed(1),ga:o.ga.toFixed(1)});

  const saveManual=()=>{
    const n=now();
    if(c)setHs(prev=>[{...n,m,i1:fx(i1),i2:fx(i2),p1data:p1,p2data:p2,p1name,p2name},...prev].slice(0,20));
    else setHs(prev=>[{...n,m,i1:fx(i1),i2:fx(i1),solo:true,p1data:p1,p1name},...prev].slice(0,20));
  };
  const loadPreset=(e)=>{
    if(!e.p1data)return;
    setP1({...DEF,...e.p1data});setP1name(e.p1name||'');
    if(e.p2data){setP2({...DEF,...e.p2data});setP2name(e.p2name||'');setC(true);}else setC(false);
    setM(e.m);
  };
  const deleteOne=(idx)=>setHs(prev=>prev.filter((_,i)=>i!==idx));

  const resetAll=()=>{setP1(DEF);setP2(DEF);setP1name('');setP2name('');};
  const resetSlot=(s)=>{if(s==='p2'){setP2(DEF);setP2name('');}else{setP1(DEF);setP1name('');}};

  const savePlayer=(s)=>{const data=s==='p2'?p2:p1;const nm=(s==='p2'?p2name:p1name)||('Player '+(roster.length+1));setRoster(prev=>[{name:nm,isGk:m==='goalkeeper',mode:m,data,ts:Date.now()},...prev].slice(0,50));};
  const loadRosterInto=(entry,s)=>{if(s==='p2'){setP2({...DEF,...entry.data});setP2name(entry.name);setC(true);}else{setP1({...DEF,...entry.data});setP1name(entry.name);}if(entry.mode)setM(entry.mode);};
  const delRoster=(i)=>setRoster(prev=>prev.filter((_,idx)=>idx!==i));

  /* OCR */
  const loadImgBlob=(blob)=>{const rd=new FileReader();rd.onload=()=>{setOcrImg(rd.result);setOcrRes(null);setOcrFound([]);setOcrProg(0);setOcrErr('');setOcrName('');};rd.readAsDataURL(blob);};
  const onOcrFile=(e)=>{const f=e.target.files&&e.target.files[0];if(f)loadImgBlob(f);};
  const pasteClip=async()=>{
    setOcrErr('');
    try{
      if(!navigator.clipboard||!navigator.clipboard.read){setOcrErr('Clipboard read not available - press Ctrl+V instead.');return;}
      const items=await navigator.clipboard.read();
      for(const it of items){const type=it.types.find(t=>t.startsWith('image/'));if(type){loadImgBlob(await it.getType(type));return;}}
      setOcrErr('No image found in the clipboard.');
    }catch(err){setOcrErr('Paste failed - press Ctrl+V instead. ('+(err&&err.message?err.message:err)+')');}
  };

  useEffect(()=>{
    if(!showOcr)return;
    const onPaste=(e)=>{const items=e.clipboardData&&e.clipboardData.items;if(!items)return;for(const it of items){if(it.type&&it.type.indexOf('image')===0){const blob=it.getAsFile();if(blob){loadImgBlob(blob);e.preventDefault();}break;}}};
    const onOver=(e)=>{e.preventDefault();setDragging(true);};
    const onLeave=(e)=>{e.preventDefault();setDragging(false);};
    const onDrop=(e)=>{e.preventDefault();setDragging(false);const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(f&&f.type.indexOf('image')===0)loadImgBlob(f);};
    window.addEventListener('paste',onPaste);window.addEventListener('dragover',onOver);window.addEventListener('dragleave',onLeave);window.addEventListener('drop',onDrop);
    return()=>{window.removeEventListener('paste',onPaste);window.removeEventListener('dragover',onOver);window.removeEventListener('dragleave',onLeave);window.removeEventListener('drop',onDrop);};
  },[showOcr]);

  const runOcr=async()=>{
    if(!ocrImg){setOcrErr('Choose an image first.');return;}
    if(ocrEngine==='gemini'&&!gkey.trim()){setOcrErr('Enter your Gemini API key first (in Settings).');return;}
    if(ocrEngine==='tesseract'&&typeof Tesseract==='undefined'){setOcrErr('Offline OCR library not loaded - check your connection and retry.');return;}
    setOcrBusy(true);setOcrProg(0);setOcrErr('');
    try{
      const out=ocrEngine==='gemini'?await geminiExtract(ocrImg,gkey):await tesseractExtract(ocrImg,setOcrProg);
      setOcrRaw(out.raw||'');setOcrRes(out.res);setOcrFound(Object.keys(out.res));setOcrGk(out.isGk);setOcrName(out.name||'');
      if(Object.keys(out.res).length===0)setOcrErr('No attributes recognized.'+(ocrEngine==='tesseract'?' Try a sharper screenshot cropped to the attributes.':''));
    }catch(err){setOcrErr((ocrEngine==='gemini'?'Gemini request failed: ':'OCR failed: ')+(err&&err.message?err.message:err));}
    setOcrBusy(false);
  };
  const updOcr=(k,v)=>{const nv=Math.max(1,Math.min(20,parseInt(v)||1));setOcrRes(prev=>({...prev,[k]:nv}));};
  const applyOcr=()=>{
    if(!ocrRes)return;
    if(ocrTarget==='p2'){setP2(prev=>({...prev,...ocrRes}));if(ocrName)setP2name(ocrName);}
    else{setP1(prev=>({...prev,...ocrRes}));if(ocrName)setP1name(ocrName);}
    if(ocrGk)setM('goalkeeper');else if(m==='goalkeeper')setM('all');
    setShowOcr(false);setOcrImg(null);setOcrRes(null);setOcrFound([]);setOcrProg(0);setOcrErr('');setOcrName('');
  };
  const closeOcr=()=>{if(ocrBusy)return;setShowOcr(false);};

  const th=dm?{
    bg:'bg-gray-950',card:'bg-gray-900',cb:'border-gray-700',txt:'text-gray-100',txt2:'text-gray-300',txtm:'text-gray-500',
    inp:'bg-gray-800 border-gray-700 text-gray-100',btn:'bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700',
    bc:'border-gray-800',ib:'bg-gray-900',bar:'bg-gray-950/85',seg:'bg-gray-800 border border-gray-700',acc:'bg-amber-500 text-gray-900 border border-amber-500'
  }:{
    bg:'bg-gray-50',card:'bg-white',cb:'border-gray-300',txt:'text-gray-900',txt2:'text-gray-700',txtm:'text-gray-500',
    inp:'bg-white border-gray-300 text-gray-900',btn:'bg-white text-gray-700 hover:bg-gray-100 border border-gray-300',
    bc:'border-gray-200',ib:'bg-gray-100',bar:'bg-gray-50/85',seg:'bg-gray-100 border border-gray-200',acc:'bg-amber-500 text-gray-900 border border-amber-500'
  };

  const ncol=c?(vw>=1280?2:1):(vw>=1024?3:vw>=640?2:1);
  const gkGrid=c?'grid grid-cols-1 xl:grid-cols-2 gap-4 items-start':'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 items-start';
  const visLen=(keys)=>((c&&onlyDiff)?keys.filter(k=>p1[k]!==p2[k]):keys).length;
  const outCats=[['Physical',PH],['Mental',ME],['Technical',TE],['Hidden',HI]]
    .map(([title,grp])=>({title,keys:visSorted(grp)}))
    .filter(cat=>visLen(cat.keys)>0);
  const catCols=Array.from({length:ncol},()=>[]);
  const catColH=Array.from({length:ncol},()=>0);
  outCats.forEach(cat=>{let mi=0;for(let i=1;i<ncol;i++)if(catColH[i]<catColH[mi])mi=i;catCols[mi].push(cat);catColH[mi]+=visLen(cat.keys)+2;});
  const tabBtn=(id,label)=><button onClick={()=>setM(id)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${m===id?th.acc:th.btn}`}>{label}</button>;
  const navBtn=(on,onClick,label,Icon)=><button onClick={onClick} title={label} className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold transition-colors ${on?th.acc:th.btn}`}><Icon className="w-4 h-4"/><span className="hidden md:inline">{label}</span></button>;

  const sStat=(v,kind,lbl)=><div className="w-24 text-center"><div className={`text-3xl font-bold tabular-nums ${colFor(v,kind)}`}>{fmt(v)}</div><div className={`text-[11px] font-medium mt-2 ${th.txtm} uppercase tracking-wide`}>{lbl}</div></div>;
  const metricSingle=<div className={`relative flex flex-col items-center justify-center p-6 ${th.card} border ${th.cb} rounded-xl mb-6 shadow-sm`}>
    <button onClick={()=>resetSlot('p1')} title="Reset to 8" className={`absolute top-4 right-4 p-2 rounded-lg ${th.btn}`}><IcReset className="w-4 h-4"/></button>
    <input placeholder="Player Name" value={p1name} onChange={e=>setP1name(e.target.value)} className={`w-full max-w-md text-2xl font-bold text-center bg-transparent border-b-2 border-transparent hover:border-gray-500/40 focus:border-amber-500 focus:outline-none mb-6 ${th.txt}`}/>
    <div className="flex items-start justify-center gap-4 sm:gap-8">
      {sStat(i1.pt,'pt','Points')}{sStat(i1.gf,'gf','Goals For')}{sStat(i1.ga,'ga','Goals Against')}
    </div>
  </div>;

  const dPt=i1.pt-i2.pt,dGf=i1.gf-i2.gf,dGa=i1.ga-i2.ga;
  const lead=Math.abs(dPt)<0.05?'even':dPt>0?'p1':'p2';
  const verdict=lead==='even'?'Evenly matched':((lead==='p1'?(p1name||'Player 1'):(p2name||'Player 2'))+' is better');
  
  const dStat=(v,kind,lbl)=><div className="text-center w-16 sm:w-20"><div className={`text-lg sm:text-xl font-bold tabular-nums whitespace-nowrap ${dcolFor(v,kind)}`}>{fmt(v)}</div><div className={`text-[10px] font-medium uppercase ${th.txtm}`}>{lbl}</div></div>;
  const metricCompare=<div className={`grid grid-cols-1 md:grid-cols-3 items-stretch p-5 ${th.card} border ${th.cb} rounded-xl mb-6 shadow-sm`}>
    <div className="flex flex-col items-center md:items-start justify-center gap-1 px-1 md:px-4 py-2 min-w-0">
      <div className="flex items-center gap-2 w-full">
        <button onClick={()=>resetSlot('p1')} title="Reset Player 1 to 8" className={`p-1.5 rounded-lg ${th.btn} shrink-0`}><IcReset className="w-3.5 h-3.5"/></button>
        <input placeholder="Player 1" value={p1name} onChange={e=>setP1name(e.target.value)} className={`flex-1 min-w-0 text-lg font-bold text-center md:text-left bg-transparent border-b-2 border-transparent hover:border-gray-500/40 focus:border-amber-500 focus:outline-none ${th.txt}`}/>
      </div>
      <div className={`text-2xl font-bold tabular-nums mt-1 ${th.txt}`}>{fmt(i1.pt)}</div>
      <div className={`text-[11px] font-medium uppercase tracking-wider ${th.txtm}`}>Points</div>
    </div>

    <div className={`flex flex-col items-center justify-center gap-2 px-4 py-4 md:py-0 border-y md:border-y-0 md:border-x ${th.bc}`}>
      <div className="text-[11px] font-bold uppercase tracking-widest text-amber-500">Difference</div>
      <div className="flex items-center justify-center gap-3">
        {dStat(dPt,'pt','Pts')}{dStat(dGf,'gf','GF')}{dStat(dGa,'ga','GA')}
      </div>
      <div className={`text-xs font-bold text-center px-3 py-1 rounded-full ${lead==='even'?th.ib+' '+th.txtm:'bg-emerald-500/10 text-emerald-500'}`}>{verdict}</div>
    </div>

    <div className="flex flex-col items-center md:items-end justify-center gap-1 px-1 md:px-4 py-2 min-w-0">
      <div className="flex items-center gap-2 w-full">
        <input placeholder="Player 2" value={p2name} onChange={e=>setP2name(e.target.value)} className={`flex-1 min-w-0 text-lg font-bold text-center md:text-right bg-transparent border-b-2 border-transparent hover:border-gray-500/40 focus:border-amber-500 focus:outline-none ${th.txt}`}/>
        <button onClick={()=>resetSlot('p2')} title="Reset Player 2 to 8" className={`p-1.5 rounded-lg ${th.btn} shrink-0`}><IcReset className="w-3.5 h-3.5"/></button>
      </div>
      <div className={`text-2xl font-bold tabular-nums mt-1 ${th.txt}`}>{fmt(i2.pt)}</div>
      <div className={`text-[11px] font-medium uppercase tracking-wider ${th.txtm}`}>Points</div>
    </div>
  </div>;

  return <div className={`min-h-screen ${th.bg} ${th.txt}`}>

  {showSettings&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4" onClick={()=>setShowSettings(false)}>
    <div className={`${th.card} border ${th.cb} rounded-lg shadow-2xl max-w-md w-full max-h-[90vh] overflow-y-auto p-5`} onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-4"><h2 className={`text-base font-semibold flex items-center gap-2 ${th.txt}`}><IcSettings className={`w-4 h-4 ${ACC}`}/>Settings</h2><button onClick={()=>setShowSettings(false)} className={`px-2 py-1 ${th.btn} rounded-lg`}>Close</button></div>

      <div className="space-y-4">
        <div className="flex items-center justify-between gap-3">
          <span className={`text-sm font-medium ${th.txt2}`}>Theme</span>
          <Seg value={dm?'dark':'light'} onChange={v=>setDm(v==='dark')} th={th} options={[{v:'light',label:'Light',icon:<IcSun className="w-4 h-4"/>},{v:'dark',label:'Dark',icon:<IcMoon className="w-4 h-4"/>}]}/>
        </div>
        <div className="flex items-center justify-between gap-3">
          <span className={`text-sm font-medium ${th.txt2}`}>Import engine</span>
          <Seg value={ocrEngine} onChange={chooseEngine} th={th} options={[{v:'gemini',label:'Gemini'},{v:'tesseract',label:'Offline'}]}/>
        </div>
        <div>
          <div className="flex items-center justify-between gap-3 mb-1"><span className={`text-sm font-medium ${th.txt2}`}>Gemini API key</span><a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" className={`text-xs ${ACC} underline`}>Get a free key</a></div>
          <input type="password" value={gkey} onChange={e=>saveGkey(e.target.value)} placeholder="Paste your free Gemini API key" className={`w-full px-2.5 py-1.5 ${th.inp} border rounded-lg text-sm`}/>
          <p className={`text-[11px] ${th.txtm} mt-1`}>Free · stored only in this browser · used only by the Gemini engine.</p>
        </div>
        <div className="flex items-center justify-between gap-3">
          <span className={`text-sm font-medium ${th.txt2}`}>Reset all players</span>
          <button onClick={()=>{resetAll();setShowSettings(false);}} className={`px-3 py-1.5 rounded-lg text-sm ${th.btn}`}>Reset to 8</button>
        </div>
      </div>

      <div className={`mt-5 pt-4 border-t ${th.cb} space-y-4`}>
        <div>
          <h3 className={`text-xs font-bold uppercase tracking-wider ${ACC} mb-2`}>How to use</h3>
          <div className={`space-y-1 text-xs ${th.txtm}`}><div><b className={th.txt2}>Import</b> — auto-fill a player from a screenshot.</div><div><b className={th.txt2}>Modes</b> — All / Offensive / Defensive / Goalkeeper change which attributes count.</div><div><b className={th.txt2}>Values</b> — 1-20; 8 is neutral (impact 0).</div><div><b className={th.txt2}>Compare</b> — edit two players; the Δ shows who is better overall.</div><div><b className={th.txt2}>Breakdown</b> — which attributes drive the score.</div></div>
        </div>
        <div>
          <h3 className={`text-xs font-bold uppercase tracking-wider ${ACC} mb-2`}>Attribute tiers</h3>
          <div className={`space-y-1 text-xs ${th.txtm}`}><div><b className="text-rose-500">S 60+</b> · Pace (64), Acceleration (64)</div><div><b className="text-orange-500">A 15-20</b> · Stamina (19), Dribbling (19), Anticipation (18), Jumping Reach (16)</div><div><b className="text-amber-500">B 8-14</b> · Balance (13), Work Rate (12), Consistency (10), Strength (10), Concentration (9), Finishing (8), Agility (8)</div><div><b className="text-emerald-500">C 4-7</b> · Long Shots (6), Determination (6), Heading (5), Crossing (4)</div><div><b className="text-sky-500">D 0-3</b> · First Touch (3), Passing (2), Natural Fitness (2), Technique (1), Decisions (1), Composure (1), Tackling (1)</div></div>
        </div>
        <p className={`text-[11px] ${th.txtm}`}>Weights from <a href="https://fm-arena.com/thread/14009-attribute-testing-football-manager-24/" target="_blank" rel="noopener" className={`${ACC} underline`}>FM Arena (FM24)</a>, 38-match testing.</p>
      </div>
    </div>
  </div>}

  {showOcr&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4" onClick={closeOcr}>
    <div className={`${th.card} border ${th.cb} rounded-lg shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-5`} onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-4"><h2 className={`text-base font-semibold flex items-center gap-2 ${th.txt}`}><IcCamera className={`w-4 h-4 ${ACC}`}/>Import from screenshot</h2><button onClick={closeOcr} disabled={ocrBusy} className={`px-2 py-1 ${th.btn} rounded-lg`}>Close</button></div>
      {!ocrRes&&<>
        {c&&<div className="flex justify-center mb-3"><Seg value={ocrTarget} onChange={setOcrTarget} th={th} options={[{v:'p1',label:p1name||'Player 1'},{v:'p2',label:p2name||'Player 2'}]}/></div>}
        <div className={`border-2 border-dashed rounded-lg p-5 text-center transition-colors ${dragging?'border-amber-500 bg-amber-500/10':th.bc}`}>
          {ocrImg?<img src={ocrImg} alt="preview" className={`max-h-44 rounded border ${th.bc} mx-auto mb-3`}/>:<IcCamera className={`w-8 h-8 mx-auto mb-2 ${th.txtm}`}/>}
          <p className={`text-sm ${th.txt2} mb-3`}>{ocrImg?'Screenshot ready':'Drag & drop a screenshot'}</p>
          <div className="flex items-center justify-center gap-2">
            <label className={`cursor-pointer px-3 py-1.5 rounded-lg text-sm font-medium ${th.acc}`}>Browse<input type="file" accept="image/*" onChange={onOcrFile} disabled={ocrBusy} className="hidden"/></label>
            <button onClick={pasteClip} disabled={ocrBusy} className={`px-3 py-1.5 rounded-lg text-sm font-medium ${th.btn}`}>Paste</button>
          </div>
          <p className={`text-[11px] ${th.txtm} mt-2`}>…or press Ctrl+V</p>
        </div>
        {ocrErr&&<div className={`mt-3 text-sm ${NEG}`}>{ocrErr}</div>}
        <button onClick={runOcr} disabled={!ocrImg||ocrBusy} className={`w-full px-4 py-2 rounded-lg font-medium mt-3 ${(!ocrImg||ocrBusy)?'bg-gray-600 text-gray-400 cursor-not-allowed':th.acc}`}>{ocrBusy?(ocrEngine==='gemini'?'Reading…':`Reading... ${ocrProg}%`):'Read screenshot'}</button>
        {ocrBusy&&ocrEngine==='tesseract'&&<div className="mt-3 h-1.5 bg-gray-700 rounded overflow-hidden"><div className="h-full bg-amber-500" style={{width:ocrProg+'%'}}/></div>}
        <p className={`text-[11px] ${th.txtm} mt-3 text-center`}>Reading with <b className={th.txt2}>{ocrEngine==='gemini'?'Gemini (cloud)':'Offline OCR'}</b> · <button onClick={()=>{setShowOcr(false);setShowSettings(true);}} className={`${ACC} underline`}>Change in Settings</button>{ocrEngine==='gemini'&&!gkey.trim()?<span className={NEG}> · API key required</span>:null}</p>
      </>}
      {ocrRes&&(()=>{const expKeys=(ocrGk?Object.values(MAP_GK):Object.values(MAP_OUT)).filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>attr[a].localeCompare(attr[b],'en'));const cur=ocrTarget==='p2'?p2:p1;return <div className="mt-2">
        <div className="flex items-center justify-between mb-2"><h3 className={`text-sm font-semibold ${th.txt}`}>Review - read {ocrFound.length} of {expKeys.length}{ocrGk&&<span className={`text-xs ${th.txtm} ml-1`}>· Goalkeeper</span>}</h3><button onClick={()=>{setOcrRes(null);setOcrFound([]);setOcrProg(0);setOcrErr('');}} className={`text-xs px-2 py-1 ${th.btn} rounded`}>Re-read</button></div>
        {ocrName&&<p className={`text-xs ${th.txtm} mb-1`}>Detected name: <span className={`font-medium ${th.txt2}`}>{ocrName}</span></p>}
        <p className={`text-xs ${th.txtm} mb-2`}>Attributes not detected are marked <span className={`${ACC} font-medium`}>not read</span> and kept at their current value.</p>
        <div className="grid grid-cols-2 gap-x-4 gap-y-1 max-h-64 overflow-y-auto pr-1">{expKeys.map(k=>{const found=ocrFound.indexOf(k)>=0;const val=(k in ocrRes)?ocrRes[k]:cur[k];return <div key={k} className={`flex items-center justify-between py-1 border-b ${th.bc}`}><span className={`text-xs ${th.txt2} flex items-center gap-1`}>{attr[k]}{!found&&<span className={`text-[10px] ${ACC}`}>not read</span>}</span><input type="number" min="1" max="20" value={val} onChange={e=>updOcr(k,e.target.value)} className={`w-14 px-1 py-0.5 ${th.inp} border rounded text-center text-sm ${found?'':'ring-1 ring-amber-500'}`}/></div>;})}</div>
        <details className="mt-3"><summary className={`text-xs ${th.txtm} cursor-pointer`}>Show raw OCR text (debug)</summary><pre className={`mt-1 text-[10px] whitespace-pre-wrap max-h-40 overflow-y-auto ${th.ib} ${th.txtm} p-2 rounded`}>{ocrRaw}</pre></details>
        <div className="flex gap-2 mt-4"><button onClick={applyOcr} className={`flex-1 px-4 py-2 rounded-lg font-medium ${th.acc}`}>Apply to {c?(ocrTarget==='p2'?(p2name||'Player 2'):(p1name||'Player 1')):'Player'}</button><button onClick={closeOcr} className={`px-4 py-2 ${th.btn} rounded`}>Cancel</button></div>
      </div>;})()}
    </div>
  </div>}

  <div className="max-w-6xl mx-auto px-3 py-3">

    <div className={`sticky top-0 z-30 -mx-3 px-3 py-3 mb-6 border-b ${th.cb} ${th.bar} backdrop-blur`}>
      <div className="flex items-center justify-between gap-2">
        <div className="flex items-center gap-2">
          <span className={`inline-flex items-center justify-center w-8 h-8 rounded-lg bg-amber-500 text-gray-900`}><IcTrophy className="w-5 h-5"/></span>
          <h1 className={`text-base sm:text-lg font-bold tracking-tight ${th.txt} hidden sm:block`}>FM Attribute Comparator</h1>
        </div>
        <div className="flex items-center gap-1.5 flex-wrap justify-end">
          {navBtn(false,()=>{setOcrTarget('p1');setShowOcr(true);},'Import',IcCamera)}
          {navBtn(c,()=>setC(!c),'Compare',IcCompare)}
          {navBtn(false,saveManual,'Save',IcSave)}
          {navBtn(showBreak,()=>setShowBreak(!showBreak),'Breakdown',IcChart)}
          {navBtn(showRoster,()=>setShowRoster(!showRoster),'Players',IcUsers)}
          {navBtn(showHs,()=>setShowHs(!showHs),'History',IcHistory)}
          {navBtn(showSettings,()=>setShowSettings(true),'Settings',IcSettings)}
        </div>
      </div>
    </div>

    {c?metricCompare:metricSingle}

    {!seenTip&&<div className={`mb-6 ${th.ib} border-l-4 border-sky-500 border ${th.cb} rounded-xl px-4 py-3 flex items-center justify-between gap-4 shadow-sm`}>
      <p className={`text-sm font-medium ${th.txt2}`}>Tip: import a player from a screenshot with the <button onClick={()=>{setOcrTarget('p1');setShowOcr(true);}} className={`font-bold ${ACC} underline hover:text-amber-400`}>Import</button> button.</p>
      <button onClick={dismissTip} className={`px-3 py-1.5 ${th.btn} rounded-lg text-sm font-bold shrink-0`}>Dismiss</button>
    </div>}

    <div className="flex items-center gap-2 flex-wrap mb-5">
      {tabBtn('all','All')}{tabBtn('offensive','Offensive')}{tabBtn('defensive','Defensive')}{tabBtn('goalkeeper','Goalkeeper')}
      <span className={`text-sm font-medium ${th.txtm} ml-2`}>{vis.filter(k=>imp[k]).length} attributes active</span>
      {c&&<label className={`ml-auto flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium ${onlyDiff?th.acc:th.btn} cursor-pointer`}><input type="checkbox" checked={onlyDiff} onChange={e=>setOnlyDiff(e.target.checked)} className="accent-amber-500 w-4 h-4"/>Only differences</label>}
    </div>

    {showBreak&&<Breakdown rows={breakRows} th={th} compare={c}/>}

    {showRoster&&<div className={`${th.ib} border ${th.cb} rounded-xl p-4 sm:p-5 mb-5 shadow-sm`}>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <h3 className={`text-sm font-bold uppercase tracking-wider ${ACC} flex items-center gap-2`}><IcUsers className="w-4 h-4"/>Saved players ({roster.length})</h3>
        <div className="flex gap-2"><button onClick={()=>savePlayer('p1')} className={`px-3 py-1.5 rounded-lg text-sm font-medium ${th.btn}`}>Save {p1name||'Player 1'}</button>{c&&<button onClick={()=>savePlayer('p2')} className={`px-3 py-1.5 rounded-lg text-sm font-medium ${th.btn}`}>Save {p2name||'Player 2'}</button>}</div>
      </div>
      {roster.length===0?<p className={`text-sm ${th.txtm}`}>No saved players yet.</p>:
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 max-h-80 overflow-y-auto pr-2">{roster.map((e,i)=><div key={i} className={`${th.card} border ${th.bc} rounded-lg p-3 flex items-center justify-between gap-3 shadow-sm`}>
        <div className="min-w-0"><div className={`text-base font-bold truncate ${th.txt}`}>{e.name}</div><div className={`text-xs font-medium mt-0.5 ${th.txtm}`}>{e.isGk?'GK':e.mode==='offensive'?'Off':e.mode==='defensive'?'Def':'All'}</div></div>
        <div className="flex items-center gap-1.5 shrink-0"><button onClick={()=>loadRosterInto(e,'p1')} title="Load into Player 1" className={`px-2 py-1 rounded-md text-xs font-bold ${th.btn}`}>P1</button><button onClick={()=>loadRosterInto(e,'p2')} title="Load into Player 2" className={`px-2 py-1 rounded-md text-xs font-bold ${th.btn}`}>P2</button><button onClick={()=>delRoster(i)} title="Delete" className={`p-1.5 rounded-md ${th.btn}`}><IcTrash className="w-4 h-4"/></button></div>
      </div>)}</div>}
    </div>}

    {showHs&&<div className={`${th.ib} border ${th.cb} rounded-xl p-4 sm:p-5 mb-5 shadow-sm`}>
      <h3 className={`text-sm font-bold uppercase tracking-wider ${ACC} mb-4 flex items-center gap-2`}><IcHistory className="w-4 h-4"/>History ({hs.length}/20)</h3>
      {hs.length===0?<p className={`text-sm ${th.txtm}`}>No snapshots yet — use Save to capture the current view.</p>:
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-3 max-h-96 overflow-y-auto pr-2">{hs.map((e,idx)=>{const dP=e.solo?null:parseFloat(e.i1.pt)-parseFloat(e.i2.pt);return <div key={idx} className={`${th.card} border ${th.bc} rounded-lg p-3 shadow-sm`}><div className="flex justify-between items-center mb-2"><span className={`text-xs font-medium ${th.txtm}`}>{e.d} {e.t} · {e.m==='all'?'All':e.m==='offensive'?'Off':e.m==='defensive'?'Def':'GK'}</span><div className="flex gap-1.5"><button onClick={()=>loadPreset(e)} title="Load" className={`p-1.5 rounded-md ${th.btn}`}><IcLoad className="w-4 h-4"/></button><button onClick={()=>deleteOne(idx)} title="Delete" className={`p-1.5 rounded-md ${th.btn}`}><IcTrash className="w-4 h-4"/></button></div></div>{e.solo?<div className={`text-sm ${th.txtm}`}><b className={`text-base ${th.txt2}`}>{e.p1name||'Player'}</b> <span className="mx-1">·</span> Pts {e.i1.pt} <span className="mx-1">·</span> GF {e.i1.gf} <span className="mx-1">·</span> GA {e.i1.ga}</div>:<div className={`text-sm ${th.txtm} space-y-1.5`}><div><b className={`text-base ${th.txt2}`}>{e.p1name||'P1'}</b> <span className="mx-1">·</span> Pts {e.i1.pt} <span className="mx-1">·</span> GF {e.i1.gf} <span className="mx-1">·</span> GA {e.i1.ga}</div><div><b className={`text-base ${th.txt2}`}>{e.p2name||'P2'}</b> <span className="mx-1">·</span> Pts {e.i2.pt} <span className="mx-1">·</span> GF {e.i2.gf} <span className="mx-1">·</span> GA {e.i2.ga}</div><div className="pt-1 border-t border-gray-500/20">Δ Pts <span className={`font-bold ml-1 ${dP>0?POS:dP<0?NEG:NEU}`}>{dP>0?'+':''}{dP.toFixed(1)}</span></div></div>}</div>})}</div>}
    </div>}

    {m==='goalkeeper'
      ?<div className={gkGrid}><Cat title="Goalkeeper" keys={sortKeys(GKL)} compare={c} p1={p1} p2={p2} setP1={setP1} setP2={setP2} th={th} onlyDiff={onlyDiff}/></div>
      :<div className="flex gap-4 items-start">
        {catCols.map((col,ci)=><div key={ci} className="flex-1 min-w-0 flex flex-col gap-4">
          {col.map(cat=><Cat key={cat.title} title={cat.title} keys={cat.keys} compare={c} p1={p1} p2={p2} setP1={setP1} setP2={setP2} th={th} onlyDiff={onlyDiff}/>)}
        </div>)}
      </div>}

    <footer className={`mt-8 pt-4 border-t ${th.cb} text-center text-xs font-medium ${th.txtm}`}>Reference 8 = neutral · Weights from <a href="https://fm-arena.com/thread/14009-attribute-testing-football-manager-24/" target="_blank" rel="noopener" className={`${ACC} underline hover:text-amber-400`}>FM Arena (FM24)</a></footer>

  </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
